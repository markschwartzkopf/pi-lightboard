<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="faders.css" />
    <link rel="stylesheet" type="text/css" href="buttons.css" />
    <link rel="stylesheet" type="text/css" href="color-picker.css" />
    <style>
      :root {
        --fader-width: 4rem;
        --val-height: 2rem;
        --name-height: 4rem;
        --fader-height: 15rem;
        --label-2: green;
        --label-3: blue;
        --selected-color: #ffffff4d;
      }
      body {
        background-color: #272727;
        font-family: Arial, Helvetica, sans-serif; /* cooper hewitt? */
        margin: 5px;
        /* overflow: hidden; */
      }
      p {
        display: inline;
      }
      .val {
        width: 80%;
        height: 1rem;
        padding-top: 0.1rem;
        text-align: center;
        font-size: 70%;
        background-color: black;
        color: lightgray;
        border: 1px solid #202020;
      }
      .val-label-div {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .faderdiv {
        grid-row: 2/3;
        height: var(--fader-height);
        width: var(--fader-width);
      }
      .control-label {
        width: calc(100% - 6px);
        height: calc(100% - 6px - 0.5rem);
        /* margin-top: 0.5rem; */
        text-align: center;
        background-color: lightgray;
        color: black;
        border: 1px solid #888888;
        border-radius: 3px;
        overflow: hidden;
        cursor: default;
      }
      .controls {
        place-items: center center;
        width: calc(100vw - 10px); /* body margin * 2 */
        overflow-x: auto;
        display: grid;
        grid-auto-columns: var(--fader-width);
        grid-template-rows: var(--val-height) var(--fader-height) var(
            --name-height
          );
      }
      input[type='text'] {
        -moz-appearance: none; /* older firefox */
        -webkit-appearance: none; /* safari, chrome, edge and ie mobile */
        appearance: none; /* rest */
      }
      .empty-control {
        background-color: rgba(214, 214, 214, 0.5);
        --margin: 2px;
        margin: var(--margin);
        width: calc(100% - (2 * var(--margin)));
        height: calc(100% - (2 * var(--margin)));
        border-radius: calc(var(--fader-height) / 50);
      }
      .nav-button {
        background-color: black;
        color: white;
        margin: 0.1rem;
        padding: 0.3rem;
        border: 0.1rem solid lightgray;
        border-radius: 999rem;
        cursor: default;
      }
      #buttons {
        margin: .2rem
      }
      /* body * {
        background-color: white;
      } */
    </style>
  </head>
  <body>
    <div id="primary" class="controls"></div>
    <div id="buttons" style="display: flex;"></div>
    <div id="secondary" class="controls"></div>
    <script src="index.js"></script>
  </body>
</html>
