<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="faders.css" />
    <link rel="stylesheet" type="text/css" href="buttons.css" />
    <style>
      :root {
        --fader-width: 4rem;
        --val-height: 2rem;
        --name-height: 4rem;
        --fader-height: 15rem;
      }
      body {
        background-color: #272727;
        font-family: Arial, Helvetica, sans-serif;
        margin: 5px;
        /* overflow: hidden; */
      }
      .val {
        width: 80%;
        height: 1rem;
        padding-top: 0.1rem;
        text-align: center;
        font-size: 70%;
        background-color: black;
        color: lightgray;
        border: 1px solid #202020;
      }
      .fader-name {
        width: calc(100% - 6px);
        height: calc(100% - 6px - 0.5rem);
        margin-top: 0.5rem;
        text-align: center;
        background-color: lightgray;
        color: black;
        border: 1px solid #888888;
        border-radius: 3px;
        overflow: hidden;
        cursor: default;
      }
      #grd {
        place-items: center center;
        width: calc(100vw - 10px); /* body margin * 2 */
        overflow-x: auto;
      }
      input[type='text'] {
        -moz-appearance: none; /* older firefox */
        -webkit-appearance: none; /* safari, chrome, edge and ie mobile */
        appearance: none; /* rest */
      }
      .empty-fader {
        background-color: rgba(214, 214, 214, 0.5);
        --margin: 2px;
        margin: var(--margin);
        width: calc(100% - (2 * var(--margin)));
        height: calc(100% - (2 * var(--margin)));
        border-radius: calc(var(--fader-height) / 50);
      }
      /* body * {
        background-color: white;
      } */
    </style>
  </head>
  <body>
    <div id="grd" style="display: grid"></div>
    <br />
    <button id="dmx-format">DMX</button>
    <button id="fixtures-format">Fixtures</button>

    <script src="index.js"></script>
  </body>
</html>
